name: Practice Project
on: push
jobs:
    lint:
        runs-on: macos-latest
        steps:
            - name: get code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v6
              with: 
                node-version: '24'
            - name: Install dependencies
              run: npm ci
            - name: Run lint
              run: npm run lint